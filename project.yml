name: SecureVault
options:
  bundleIdPrefix: com.securevault
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"
  projectFormat: "xcode15_0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: SecureVault
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: 1
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    ENABLE_BITCODE: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    INFOPLIST_FILE: Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.securevault.app

targets:
  SecureVault:
    type: application
    platform: iOS
    sources:
      - path: Sources/SecureVault
        type: group
    resources:
      - path: Resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
