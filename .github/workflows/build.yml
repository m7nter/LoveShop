name: Build IPA

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project SecureVault.xcodeproj \
            -scheme SecureVault \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/SecureVault.app Payload/
          zip -r SecureVault.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureVault.ipa
          path: SecureVault.ipa
